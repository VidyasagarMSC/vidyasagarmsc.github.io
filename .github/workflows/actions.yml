name: scrape-and-deploy

on:
  schedule:
    - cron: "0 0 * * 6" # runs every Saturday at 00:00 UTC
  workflow_dispatch: # allow manual trigger

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RSS scraper
        run: python scrape.py

      - name: Run citation scraper (OpenAlex)
        run: python scrape_citations.py

      - name: Commit scraped data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/data/
          git diff --cached --quiet || git commit -m "chore: update scraped data [skip ci]"
          git push

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
